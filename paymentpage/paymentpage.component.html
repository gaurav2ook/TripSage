<!-- payment-page.component.html -->

<header>
    <div class="logo">MyTravel</div>
    <div class="step-indicator">Step 2: Payment</div>
    <div class="support-icon">💬</div>
  </header>
  
  <section class="payment-container">
    <div class="payment-summary">
      <h3>Booking Summary</h3>
      <div class="service-details">
        <p><strong>Service:</strong> Hotel Booking</p>
        <p><strong>Location:</strong> Paris, France</p>
        <p><strong>Check-in:</strong> Dec 12, 2024</p>
        <p><strong>Check-out:</strong> Dec 15, 2024</p>
      </div>
  
      <div class="price-details">
        <p><strong>Total:</strong> $600.00</p>
      </div>
  
      <button class="edit-btn" (click)="editBooking()">Edit Booking</button>
    </div>
  
    <div class="payment-options">
      <h3>Choose Payment Method</h3>
  
      <!-- Credit Card Form -->
      <div class="credit-card-form">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" placeholder="1234 5678 9012 3456" [(ngModel)]="cardNumber" required>
  
        <div class="card-details">
          <div>
            <label for="exp-month">Exp. Month</label>
            <input type="text" id="exp-month" placeholder="MM" [(ngModel)]="expMonth" required>
          </div>
          <div>
            <label for="exp-year">Exp. Year</label>
            <input type="text" id="exp-year" placeholder="YYYY" [(ngModel)]="expYear" required>
          </div>
          <div>
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" placeholder="123" [(ngModel)]="cvv" required>
          </div>
        </div>
  
        <label for="cardholder-name">Cardholder Name</label>
        <input type="text" id="cardholder-name" placeholder="Full Name" [(ngModel)]="cardholderName" required>
      </div>
  
      <!-- PayPal Option -->
      <div class="paypal-option">
        <p>Or pay with:</p>
        <button class="paypal-btn" (click)="payWithPaypal()">PayPal</button>
      </div>
  
      <!-- Final Payment Section -->
      <div class="final-payment">
        <p><strong>Total:</strong> $600.00</p>
        <button class="pay-btn" (click)="makePayment()">Pay Now</button>
      </div>
    </div>
  </section>
  
  <footer>
    <p><a href="#">Refund Policy</a> | <a href="#">Terms and Conditions</a> | <a href="#">Privacy Policy</a></p>
  </footer>
