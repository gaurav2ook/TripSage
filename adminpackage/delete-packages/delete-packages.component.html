<div class="delete-packages-page container">
    <!-- Page Header Start -->
    <div class="container-fluid page-header mb-5 p-0" style="background-image: url(assets/img/0f172b.png); border: 4px solid #fea116;">
        <div class="container-fluid page-header-inner py-5">
            <div class="container text-center pb-5">
                <h1 class="text-white animated slideInDown">Delete Packages</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center text-uppercase" style="text-align: center;">
                        <li class="breadcrumb-item"><a href="#">Home</a></li>
                        <li class="breadcrumb-item text-white active" aria-current="page"><a href="/delete-packages">Delete Packages</a></li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>
    <!-- Page Header End -->

    <!-- Packages List Section -->
    <div class="packages-list-section section">
        <h3 style="color: #0f172b;">Manage Packages</h3>
        
        <!-- Displaying Packages -->
        <div class="packages-container" style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div *ngFor="let package of packages" class="package-card" style="width: 100%; max-width: 350px;">
                <div class="card" (click)="deletePackage(package.id)">
                    <i class="bi bi-box-seam card-icon"></i>
                    <h4>{{ package.name }}</h4>
                    <p>{{ package.description }}</p>
                    <button class="btn btn-danger">Delete Package</button>
                </div>
            </div>
        </div>

        <!-- No Packages Message -->
        <div *ngIf="packages.length === 0" class="no-packages-message">
            <p>No packages available to delete.</p>
        </div>
    </div>
</div>
