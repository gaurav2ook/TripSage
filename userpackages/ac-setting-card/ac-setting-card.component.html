<div class="account-settings container">
    <!-- Page Header Start -->
    <div class="container-fluid page-header mb-5 p-0" style="background-image: url(assets/img/0f172b.png); border: 4px solid #fea116;">
        <div class="container-fluid page-header-inner py-5">
            <div class="container text-center pb-5">
                <h1 class="text-white mb-3 animated slideInDown">Account Settings</h1>
                <p class="text-white">Manage your account details and preferences here.</p>
            </div>
        </div>
    </div>
    <!-- Page Header End -->

    <!-- Account Settings Section -->
    <div class="account-settings-section section">
        <h3>Update Your Account Information</h3>
        <div class="account-settings-container">
            <!-- Account Details Card -->
            <div class="account-card">
                <h4>Personal Information</h4>
                <form (ngSubmit)="updateAccount()">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" [(ngModel)]="user.username" class="form-control" required />
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" [(ngModel)]="user.email" class="form-control" required />
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" name="phone" [(ngModel)]="user.phone" class="form-control" required />
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" [(ngModel)]="user.address" class="form-control" rows="3" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Update Information</button>
                </form>
            </div>

            <!-- Change Password Card -->
            <div class="account-card">
                <h4>Change Password</h4>
                <form (ngSubmit)="changePassword()">
                    <div class="form-group">
                        <label for="old-password">Old Password</label>
                        <input type="password" id="old-password" name="oldPassword" [(ngModel)]="user.oldPassword" class="form-control" required />
                    </div>

                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="newPassword" [(ngModel)]="user.newPassword" class="form-control" required />
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm New Password</label>
                        <input type="password" id="confirm-password" name="confirmPassword" [(ngModel)]="user.confirmPassword" class="form-control" required />
                    </div>

                    <button type="submit" class="btn btn-danger">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
